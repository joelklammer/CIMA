# ── CIMA – Nginx reverse-proxy configuration ──────────────────────────────────
#
# Install:
#   sudo cp nginx/cima.conf /etc/nginx/sites-available/cima
#   sudo ln -s /etc/nginx/sites-available/cima /etc/nginx/sites-enabled/cima
#   sudo certbot --nginx -d yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate-limit zones (must be in http context, not inside a server block) ─────
# Global: 200 req/s per IP, burst up to 400 (handles rapid auto-saves from 120 users)
limit_req_zone $binary_remote_addr zone=cima_global:10m rate=200r/s;
# Login endpoint: max 5 attempts per minute per IP
limit_req_zone $binary_remote_addr zone=cima_login:1m  rate=5r/m;

# ── Upstream (Node.js cluster, all 4 workers share port 3000) ─────────────────
upstream cima_node {
    server 127.0.0.1:3000;

    # Keep 32 idle HTTP connections open to Node instead of opening a new
    # TCP connection for every request.  Cuts latency significantly under load.
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt certificate renewals over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificate paths – filled in automatically by Certbot
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    # ── Static files served directly by Nginx ────────────────────────────────
    # ← CHANGE THIS to the absolute path of the public/ folder on your server
    root /home/cima/cima/public;

    # Apply global rate limit to all requests
    limit_req zone=cima_global burst=400 nodelay;

    # Static assets (CSS, JS, images) – served by Nginx with long cache headers
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires    7d;
        add_header Cache-Control "public, immutable";
        try_files  $uri @node;
    }

    # All other requests – try the file on disk first, then fall back to Node
    location / {
        try_files $uri @node;
    }

    # ── Login endpoint: extra rate limiting ───────────────────────────────────
    location /api/auth/login {
        limit_req          zone=cima_login burst=3 nodelay;
        proxy_pass         http://cima_node;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Proxy to Node.js cluster ──────────────────────────────────────────────
    location @node {
        proxy_pass         http://cima_node;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # required for upstream keepalive
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\.(env|git) { deny all; }
    location ~* \.(config\.js|sql)$ { deny all; }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cima.access.log;
    error_log  /var/log/nginx/cima.error.log;

    client_max_body_size 1m;
}
